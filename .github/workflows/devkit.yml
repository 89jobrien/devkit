name: devkit

on:
  pull_request:
    branches: ["**"]

jobs:
  council:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install devkit
        run: go install github.com/89jobrien/devkit/cmd/devkit@v$(cat VERSION)

      - name: Council
        id: council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_REF: ${{ github.base_ref }}
          OUT: ${{ runner.temp }}/council-${{ github.run_id }}-${{ github.run_attempt }}.txt
        run: |
          if [[ -z "$BASE_REF" ]]; then
            echo "::error::BASE_REF is empty (expected a pull_request event)"
            exit 1
          fi
          if [[ ! "$BASE_REF" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Unexpected BASE_REF: $BASE_REF"
            exit 1
          fi
          devkit council --base "origin/$BASE_REF" --mode core > "$OUT"
          if [ ! -s "$OUT" ]; then
            echo "::error::devkit council produced no output"
            exit 1
          fi
          printf 'out=%s\n' "$OUT" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          OUT: ${{ steps.council.outputs.out }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runnerTemp = process.env.RUNNER_TEMP;
            if (!runnerTemp) { core.setFailed('RUNNER_TEMP is not set'); return; }
            const expectedName = `council-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}.txt`;
            if (path.basename(process.env.OUT) !== expectedName) {
              core.setFailed('OUT filename does not match expected pattern'); return;
            }
            const outPath = fs.realpathSync(process.env.OUT);
            const tempBase = fs.realpathSync(runnerTemp) + path.sep;
            if (!outPath.startsWith(tempBase)) {
              core.setFailed('OUT path is outside RUNNER_TEMP'); return;
            }
            const raw = fs.readFileSync(outPath, 'utf8').trim();
            const output = raw.slice(0, 60000);
            const body = `## devkit council\n\n${output}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## devkit council'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
