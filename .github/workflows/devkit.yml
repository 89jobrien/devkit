name: devkit

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install devkit
        run: go install github.com/89jobrien/devkit/cmd/devkit@latest

      - name: Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          output=$(devkit review --base "origin/$BASE_REF")
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.output }}
        with:
          script: |
            const body = `## devkit review\n\n${process.env.REVIEW_OUTPUT}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## devkit review'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  council:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install devkit
        run: go install github.com/89jobrien/devkit/cmd/devkit@latest

      - name: Council
        id: council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          output=$(devkit council --base HEAD~1 --mode core)
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post council issue
        uses: actions/github-script@v7
        env:
          COUNCIL_OUTPUT: ${{ steps.council.outputs.output }}
        with:
          script: |
            const sha = context.sha.slice(0, 8);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## devkit council — ${sha}\n\n${process.env.COUNCIL_OUTPUT}\n\n[Run](${runUrl})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `devkit council: ${sha}`,
              body,
              labels: ['devkit-council'],
            });
