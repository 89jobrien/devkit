name: devkit

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      base:
        description: 'Base ref for council diff'
        default: 'HEAD~1'

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install devkit
        run: go install github.com/89jobrien/devkit/cmd/devkit@latest

      - name: Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.base_ref }}
          OUT: ${{ runner.temp }}/review-${{ github.run_id }}-${{ github.run_attempt }}.txt
        run: |
          if [[ -z "$BASE_REF" ]]; then
            echo "::error::BASE_REF is empty (expected a pull_request event)"
            exit 1
          fi
          if [[ ! "$BASE_REF" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Unexpected BASE_REF: $BASE_REF"
            exit 1
          fi
          devkit review --base "origin/$BASE_REF" > "$OUT"
          if [ ! -s "$OUT" ]; then
            echo "::error::devkit review produced no output"
            exit 1
          fi
          printf 'out=%s\n' "$OUT" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          OUT: ${{ steps.review.outputs.out }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runnerTemp = process.env.RUNNER_TEMP;
            if (!runnerTemp) { core.setFailed('RUNNER_TEMP is not set'); return; }
            const outPath = fs.realpathSync(process.env.OUT);
            const tempBase = fs.realpathSync(runnerTemp) + path.sep;
            if (!outPath.startsWith(tempBase)) {
              core.setFailed('OUT path is outside RUNNER_TEMP'); return;
            }
            const raw = fs.readFileSync(outPath, 'utf8').trim();
            const output = raw.slice(0, 60000);
            const body = `## devkit review\n\n${output}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## devkit review'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  council:
    if: github.event_name == 'workflow_dispatch'
    environment: council
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install devkit
        run: go install github.com/89jobrien/devkit/cmd/devkit@latest

      - name: Council
        id: council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE: ${{ inputs.base }}
          OUT: ${{ runner.temp }}/council-${{ github.run_id }}-${{ github.run_attempt }}.txt
        run: |
          if [[ ! "$BASE" =~ ^[-a-zA-Z0-9._/~^]+$ ]]; then
            echo "::error::Unexpected base input: $BASE"
            exit 1
          fi
          devkit council --base "$BASE" --mode core > "$OUT"
          if [ ! -s "$OUT" ]; then
            echo "::error::devkit council produced no output"
            exit 1
          fi
          printf 'out=%s\n' "$OUT" >> "$GITHUB_OUTPUT"

      - name: Post council issue
        uses: actions/github-script@v7
        env:
          OUT: ${{ steps.council.outputs.out }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runnerTemp = process.env.RUNNER_TEMP;
            if (!runnerTemp) { core.setFailed('RUNNER_TEMP is not set'); return; }
            const outPath = fs.realpathSync(process.env.OUT);
            const tempBase = fs.realpathSync(runnerTemp) + path.sep;
            if (!outPath.startsWith(tempBase)) {
              core.setFailed('OUT path is outside RUNNER_TEMP'); return;
            }
            const raw = fs.readFileSync(outPath, 'utf8').trim();
            const output = raw.slice(0, 60000);
            const sha = context.sha.slice(0, 8);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## devkit council — ${sha}\n\n${output}\n\n[Run](${runUrl})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `devkit council: ${sha}`,
              body,
              labels: ['devkit-council'],
            });
